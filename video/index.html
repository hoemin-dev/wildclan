<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Starcraft Wildclan</title>
  <!-- BASE URL -->
  <base href="/wildclan/">
  <!-- CSS -->
  <link rel="stylesheet" href="/css/style.css">
</head>

<body>

  <!-- HEADER (공통) -->
  <header id="header" class="header"></header>

  <!-- MAIN -->
  <main>

    <!-- HERO -->
    <section class="hero">
      <h1 data-i18n="home.title">WILDCLAN</h1>
      <p data-i18n="home.subtitle">
        StarCraft is culture.
      </p>
    </section>

    <!-- QUICK LINKS -->
    <section class="quick-links">
      <a href="https://open.kakao.com" target="_blank">KAKAO</a>
      <a href="https://discord.com" target="_blank">DISCORD</a>
      <a href="/video/">VIDEO</a>
      <a href="mailto:your@email.com">EMAIL</a>
    </section>

    <!-- SUPPORT -->
    <section class="support">
      <h2 data-i18n="home.support">Support Wildclan</h2>
      <p data-i18n="home.supportDesc">
        Keep the clan running ☕
      </p>

      <a href="#" class="support-btn">☕ 2,000 KRW</a>
    </section>

  </main>

  <!-- FOOTER -->
  <footer id="footer" class="footer"></footer>

  <!-- HEADER LOAD -->
  <script src="/js/lang.js"></script>
  <script src="/js/theme.js"></script>
  <script src="/js/include.js"></script>

  <!-- i18n (초기 구조) -->
  <script>
    const i18n = {
      en: {
        "home.title": "WILDCLAN",
        "home.subtitle": "StarCraft is culture.",
        "home.support": "Support Wildclan",
        "home.supportDesc": "Keep the clan running ☕"
      },
      ko: {
        "home.title": "와일드클랜",
        "home.subtitle": "스타는 문화다",
        "home.support": "와일드클랜 후원",
        "home.supportDesc": "클랜 운영을 도와주세요 ☕"
      }
    };

    function setLang(lang) {
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.dataset.i18n;
        if (i18n[lang][key]) {
          el.textContent = i18n[lang][key];
        }
      });
    }

    // 기본 언어
    setLang('en');
  </script>

</body>
</html>
